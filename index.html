<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Hub Pro</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            500: '#3b82f6',
                            600: '#2563eb',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- HLS.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* Custom Scrollbar for Horizontal Categories */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans h-screen flex flex-col overflow-hidden">

    <!-- HEADER / NAVIGATION -->
    <header class="h-14 bg-slate-900 border-b border-slate-800 px-4 flex items-center justify-between shrink-0">
        <div class="flex items-center space-x-3">
            <i class="fa-solid font-bold text-xl text-blue-500 fa-tv"></i>
            <span class="font-bold text-lg tracking-wide bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">IPTV HUB PRO</span>
        </div>
        
        <div class="flex items-center space-x-2">
            <!-- Playlist Input Modal Trigger -->
            <button onclick="openModal('playlistModal')" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm font-medium transition flex items-center gap-2">
                <i class="fa-solid fa-plus"></i>
                <span class="hidden sm:inline">Thêm Playlist</span>
            </button>
            
            <!-- Quick Dark/Light Toggle -->
            <button onclick="toggleTheme()" class="p-2 text-slate-400 hover:text-slate-100 rounded-lg hover:bg-slate-800 transition">
                <i class="fa-solid fa-moon text-lg" id="themeIcon"></i>
            </button>
        </div>
    </header>

    <!-- MAIN CONTAINER -->
    <div class="flex-1 flex flex-col md:flex-row overflow-hidden relative">

        <!-- LEFT/MAIN COLUMN: PLAYER & HORIZONTAL CATEGORIES -->
        <main class="flex-1 flex flex-col bg-slate-950 overflow-y-auto">
            
            <!-- VIDEO PLAYER CONTAINER -->
            <div id="multiViewContainer" class="w-full bg-black relative aspect-video max-h-[45vh] md:max-h-[60vh] flex items-center justify-center border-b border-slate-800">
                <video id="mainPlayer" class="w-full h-full object-contain" controls autoplay></video>
                <div id="playerPlaceholder" class="absolute flex flex-col items-center justify-center text-slate-500">
                    <i class="fa-solid fa-play-circle text-5xl mb-2 opacity-50"></i>
                    <p class="text-sm">Chọn một kênh để bắt đầu xem</p>
                </div>
            </div>

            <!-- HORIZONTAL CATEGORY SCROLLBAR (NHÓM KÊNH CUỘN NGANG) -->
            <div class="bg-slate-900 border-b border-slate-800 p-2.5 shrink-0">
                <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5 px-1 flex items-center justify-between">
                    <span><i class="fa-solid fa-layer-group mr-1.5 text-blue-400"></i>Nhóm kênh</span>
                    <span id="categoryCount" class="text-[10px] bg-slate-800 px-1.5 py-0.5 rounded text-slate-400">0 Nhóm</span>
                </div>
                <div id="categoryContainer" class="flex items-center gap-2 overflow-x-auto no-scrollbar py-1 px-1 scroll-smooth">
                    <!-- Default All Button -->
                    <button onclick="filterGroup('ALL')" class="cat-btn active bg-blue-600 text-white px-3.5 py-1.5 rounded-full text-xs font-medium whitespace-nowrap transition shrink-0 shadow-sm">
                        Tất cả kênh
                    </button>
                    <span class="text-xs text-slate-600 shrink-0">Chưa có dữ liệu playlist...</span>
                </div>
            </div>

            <!-- CHANNEL GRID / LIST AREA (MOBILE BELOW / DESKTOP INTEGRATED) -->
            <div class="flex-1 p-3 overflow-y-auto">
                <div class="flex items-center justify-between mb-2">
                    <h2 class="text-sm font-semibold text-slate-300 flex items-center gap-2">
                        <i class="fa-solid fa-list-ul text-blue-500"></i>
                        <span id="currentGroupTitle">Tất cả kênh</span>
                    </h2>
                    <span id="channelCount" class="text-xs text-slate-500">0 kênh</span>
                </div>

                <!-- Channels Grid -->
                <div id="channelGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-2.5">
                    <!-- Dynamic Channel Cards will be rendered here -->
                </div>
            </div>

        </main>

        <!-- SIDEBAR: EPG / TAB BẢNG LỊCH PHÁT SÓNG -->
        <aside class="w-full md:w-80 bg-slate-900 border-t md:border-t-0 md:border-l border-slate-800 flex flex-col h-64 md:h-auto shrink-0">
            <div class="p-3 border-b border-slate-800 flex items-center justify-between bg-slate-900/50">
                <div class="flex items-center space-x-2">
                    <i class="fa-solid fa-calendar-day text-blue-400"></i>
                    <h3 class="font-semibold text-sm text-slate-200">Lịch phát sóng (EPG)</h3>
                </div>
            </div>

            <div id="epgContainer" class="flex-1 p-3 overflow-y-auto space-y-2 text-sm">
                <div class="text-center py-8 text-slate-500">
                    <i class="fa-solid fa-clock-rotate-left text-3xl mb-2 opacity-40"></i>
                    <p class="text-xs">Chọn kênh để xem lịch chiếu chi tiết</p>
                </div>
            </div>
        </aside>

    </div>

    <!-- MODAL: ADD PLAYLIST -->
    <div id="playlistModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="bg-slate-900 border border-slate-800 rounded-xl max-w-md w-full p-5 shadow-2xl space-y-4">
            <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                <h3 class="font-bold text-slate-100 flex items-center gap-2">
                    <i class="fa-solid fa-link text-blue-500"></i> Thêm Danh Sách Kênh (M3U)
                </h3>
                <button onclick="closeModal('playlistModal')" class="text-slate-400 hover:text-white">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>

            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1">Đường dẫn URL M3U / M3U8</label>
                    <input type="url" id="playlistUrl" placeholder="https://example.com/playlist.m3u" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-blue-500">
                </div>
                <div class="text-center text-xs text-slate-500">Hoặc tải file từ máy tính</div>
                <div>
                    <input type="file" id="playlistFile" accept=".m3u,.m3u8" class="w-full text-xs text-slate-400 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-slate-800 file:text-slate-300 hover:file:bg-slate-700">
                </div>
            </div>

            <div class="flex justify-end gap-2 pt-2 border-t border-slate-800">
                <button onclick="closeModal('playlistModal')" class="px-4 py-1.5 rounded-lg text-xs font-medium bg-slate-800 text-slate-300 hover:bg-slate-700">Hủy</button>
                <button onclick="loadPlaylist()" class="px-4 py-1.5 rounded-lg text-xs font-medium bg-blue-600 text-white hover:bg-blue-500">Tải Danh Sách</button>
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT APP LOGIC -->
    <script>
        let rawChannels = [];
        let filteredChannels = [];
        let groups = [];
        let hlsPlayer = null;
        let isLocalStorageFallback = false;

        // Smart Dual-Storage Fallback Check
        function initDB() {
            try {
                const test = 'db_test';
                localStorage.setItem(test, test);
                localStorage.removeItem(test);
            } catch (e) {
                isLocalStorageFallback = true;
            }
        }
        initDB();

        // UI Helpers
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const icon = document.getElementById('themeIcon');
            if (document.documentElement.classList.contains('dark')) {
                icon.className = 'fa-solid fa-moon text-lg';
            } else {
                icon.className = 'fa-solid fa-sun text-lg text-yellow-500';
            }
        }

        // Parse M3U
        function parseM3U(content) {
            const lines = content.split('\n');
            const channels = [];
            let currentChannel = {};

            for (let line of lines) {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    const nameMatch = line.match(/,(.+)$/);
                    const groupMatch = line.match(/group-title="([^"]+)"/i);
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/i);

                    currentChannel = {
                        name: nameMatch ? nameMatch[1].trim() : 'Kênh không tên',
                        group: groupMatch ? groupMatch[1].trim() : 'Khác',
                        logo: logoMatch ? logoMatch[1].trim() : ''
                    };
                } else if (line.length > 0 && !line.startsWith('#')) {
                    currentChannel.url = line;
                    if (currentChannel.name) {
                        channels.push({ ...currentChannel });
                    }
                    currentChannel = {};
                }
            }
            return channels;
        }

        // Load Playlist Handler
        function loadPlaylist() {
            const url = document.getElementById('playlistUrl').value.trim();
            const fileInput = document.getElementById('playlistFile');

            if (fileInput.files.length > 0) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    processPlaylistData(e.target.result);
                };
                reader.readAsText(fileInput.files[0]);
                closeModal('playlistModal');
            } else if (url) {
                fetch(url)
                    .then(res => res.text())
                    .then(data => {
                        processPlaylistData(data);
                        closeModal('playlistModal');
                    })
                    .catch(() => alert('Không thể tải file từ URL này (Lỗi CORS hoặc link hỏng)'));
            } else {
                alert('Vui lòng dán link hoặc chọn file M3U');
            }
        }

        function processPlaylistData(m3uText) {
            rawChannels = parseM3U(m3uText);
            if (rawChannels.length === 0) {
                alert('Không tìm thấy danh sách kênh hợp lệ trong file M3U!');
                return;
            }

            // Extract Groups
            const groupSet = new Set(rawChannels.map(c => c.group));
            groups = Array.from(groupSet);

            renderCategoryBar();
            filterGroup('ALL');
        }

        // Render Horizontal Category Buttons
        function renderCategoryBar() {
            const container = document.getElementById('categoryContainer');
            document.getElementById('categoryCount').innerText = `${groups.length} Nhóm`;

            let html = `
                <button onclick="filterGroup('ALL')" class="cat-btn active bg-blue-600 text-white px-3.5 py-1.5 rounded-full text-xs font-medium whitespace-nowrap transition shrink-0 shadow-sm">
                    Tất cả kênh
                </button>
            `;

            groups.forEach(group => {
                html += `
                    <button onclick="filterGroup('${group.replace(/'/g, "\\'")}')" class="cat-btn bg-slate-800 hover:bg-slate-700 text-slate-300 px-3.5 py-1.5 rounded-full text-xs font-medium whitespace-nowrap transition shrink-0">
                        ${group}
                    </button>
                `;
            });

            container.innerHTML = html;
        }

        // Filter Channels by Group
        function filterGroup(groupName) {
            // Update Active Style for Category Buttons
            const buttons = document.querySelectorAll('.cat-btn');
            buttons.forEach(btn => {
                if (btn.innerText.trim() === (groupName === 'ALL' ? 'Tất cả kênh' : groupName)) {
                    btn.className = 'cat-btn active bg-blue-600 text-white px-3.5 py-1.5 rounded-full text-xs font-medium whitespace-nowrap transition shrink-0 shadow-sm';
                } else {
                    btn.className = 'cat-btn bg-slate-800 hover:bg-slate-700 text-slate-300 px-3.5 py-1.5 rounded-full text-xs font-medium whitespace-nowrap transition shrink-0';
                }
            });

            if (groupName === 'ALL') {
                filteredChannels = rawChannels;
                document.getElementById('currentGroupTitle').innerText = 'Tất cả kênh';
            } else {
                filteredChannels = rawChannels.filter(c => c.group === groupName);
                document.getElementById('currentGroupTitle').innerText = groupName;
            }

            renderChannels();
        }

        // Render Channel Grid
        function renderChannels() {
            const grid = document.getElementById('channelGrid');
            document.getElementById('channelCount').innerText = `${filteredChannels.length} kênh`;

            if (filteredChannels.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center text-slate-500 py-6 text-sm">Không có kênh nào trong nhóm này</div>';
                return;
            }

            grid.innerHTML = filteredChannels.map((ch, idx) => `
                <div onclick="playChannel('${ch.url.replace(/'/g, "\\'")}', '${ch.name.replace(/'/g, "\\'")}')" 
                     class="bg-slate-900 hover:bg-slate-800 border border-slate-800/80 hover:border-blue-500/50 p-2.5 rounded-xl cursor-pointer transition flex items-center space-x-3 group shadow-sm">
                    <div class="w-10 h-10 bg-slate-950 rounded-lg flex items-center justify-center shrink-0 overflow-hidden border border-slate-800">
                        ${ch.logo ? `<img src="${ch.logo}" class="w-full h-full object-contain" onerror="this.onerror=null; this.src=''; this.parentNode.innerHTML='<i class=\'fa-solid fa-tv text-slate-600 text-xs\'></i>';">` : `<i class="fa-solid fa-tv text-slate-600 text-xs"></i>`}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="text-xs font-medium text-slate-200 group-hover:text-blue-400 truncate">${ch.name}</div>
                        <div class="text-[10px] text-slate-500 truncate">${ch.group}</div>
                    </div>
                </div>
            `).join('');
        }

        // Play Channel
        function playChannel(url, name) {
            const video = document.getElementById('mainPlayer');
            const placeholder = document.getElementById('playerPlaceholder');

            if (placeholder) placeholder.style.display = 'none';

            if (Hls.isSupported()) {
                if (hlsPlayer) hlsPlayer.destroy();
                hlsPlayer = new Hls();
                hlsPlayer.loadSource(url);
                hlsPlayer.attachMedia(video);
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            } else {
                alert('Trình duyệt của bạn không hỗ trợ định dạng video phát sóng này.');
            }

            renderEPG(name);
        }

        // Simulated EPG Data
        function renderEPG(channelName) {
            const container = document.getElementById('epgContainer');
            container.innerHTML = `
                <div class="bg-slate-950 border border-slate-800 rounded-lg p-3 space-y-2">
                    <div class="text-xs font-semibold text-blue-400 border-b border-slate-800 pb-1">${channelName}</div>
                    <div class="flex justify-between items-center text-xs">
                        <span class="text-slate-300 font-medium">Chương trình hiện tại</span>
                        <span class="text-[10px] bg-red-500/20 text-red-400 px-1.5 py-0.5 rounded uppercase font-bold">Trực tiếp</span>
                    </div>
                    <div class="text-xs text-slate-400">Thời sự / Giải trí tổng hợp</div>
                    <div class="w-full bg-slate-800 rounded-full h-1.5 overflow-hidden">
                        <div class="bg-blue-500 h-full w-2/3"></div>
                    </div>
                </div>
                <div class="text-xs text-slate-500 pt-2 font-medium">Chương trình tiếp theo:</div>
                <div class="bg-slate-950/50 border border-slate-800/60 rounded-lg p-2.5 text-xs text-slate-400 flex justify-between">
                    <span>19:00 - Bản tin Thời sự</span>
                    <span class="text-slate-600">Sắp chiếu</span>
                </div>
                <div class="bg-slate-950/50 border border-slate-800/60 rounded-lg p-2.5 text-xs text-slate-400 flex justify-between">
                    <span>20:00 - Phim truyện đặc sắc</span>
                    <span class="text-slate-600">Sắp chiếu</span>
                </div>
            `;
        }
    </script>
</body>
</html>
