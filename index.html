            document.getElementById("hudChannelName").textContent = activeChan.name;

            const activeProg = getActiveProgram(programs);
            const progTitleEl = document.getElementById("hudProgramTitle");
            const progTimeEl = document.getElementById("hudProgramTime");

            if (activeProg) {
                progTitleEl.textContent = activeProg.title;
                const startTime = new Date(activeProg.start).toLocaleTimeString("vi-VN", { hour: '2-digit', minute: '2-digit' });
                const stopTime = new Date(activeProg.stop).toLocaleTimeString("vi-VN", { hour: '2-digit', minute: '2-digit' });
                progTimeEl.textContent = `${startTime} - ${stopTime}`;
            } else {
                progTitleEl.textContent = "Không có thông tin lịch chiếu";
                progTimeEl.textContent = "00:00 - 00:00";
            }

            hud.classList.remove("opacity-0", "translate-y-6", "pointer-events-none");
            hud.classList.add("opacity-100", "translate-y-0", "pointer-events-auto");

            clearTimeout(hudTimer);
            hudTimer = setTimeout(() => {
                hud.classList.remove("opacity-100", "translate-y-0", "pointer-events-auto");
                hud.classList.add("opacity-0", "translate-y-6", "pointer-events-none");
            }, 3000);
        }

        function updateSidebarEpgDisplay() {
            const container = document.getElementById("sidebarEpgContainer");

            const now = Date.now();
            const activeProg = getActiveProgram(programs);

            // Lọc các chương trình hiện tại và sắp chiếu tiếp theo
            const upcomingPrograms = programs.filter(p => p.stop > now - (15 * 60 * 1000)).slice(0, 12);

            let html = `
                <div class="flex items-center gap-3 pb-3 border-b border-borderColor/50 mb-3.5">
                    <img src="${activeChan.logo || ''}" onerror="this.src='https://placehold.co/40x40/252529/d0bcff?text=TV'" class="w-10 h-10 rounded-xl object-contain bg-variant p-1 border border-borderInput shrink-0 shadow-sm">

                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <h5 class="text-[9px] font-extrabold text-primary-light uppercase tracking-wider mb-2.5">Chương trình phát sóng</h5>
                <div class="space-y-2">
            `;

            upcomingPrograms.forEach(p => {
                const startStr = new Date(p.start).toLocaleTimeString("vi-VN", { hour: '2-digit', minute: '2-digit' });
                const endStr = new Date(p.stop).toLocaleTimeString("vi-VN", { hour: '2-digit', minute: '2-digit' });
                const isCurrent = activeProg && p.start === activeProg.start;

                let progressHtml = '';
                if (isCurrent) {
                    const totalDur = p.stop - p.start;
                    const elapsed = now - p.start;
                    const pct = Math.max(0, Math.min(100, (elapsed / totalDur) * 100));
                    progressHtml = `
                        <div class="w-full bg-borderInput/30 rounded-full h-1 mt-1.5 overflow-hidden">
                            <div class="bg-primary h-full transition-all duration-500" style="width: ${pct}%"></div>
                        </div>
                    `;
                }

                html += `
                    <div class="p-2.5 rounded-xl flex flex-col transition ${isCurrent ? 'bg-primary/10 border border-primary/30 shadow-sm' : 'bg-variant/30 border border-transparent hover:bg-variant/50'}">
                        <div class="flex items-center justify-between gap-2">
                            <span class="text-[10px] font-extrabold ${isCurrent ? 'text-primary' : 'text-primary-light'}">${startStr} - ${endStr}</span>

                        ${progressHtml}
                    </div>
                `;
            });

            html += `</div>`;
            container.innerHTML = html;
        }
